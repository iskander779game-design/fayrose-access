<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>FAYROSE | Wear The Mystery</title>

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700&family=Cormorant+Garamond:wght@300;400;500;600&display=swap" rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- Background -->
    <div class="background"></div>

    <!-- Dark Overlay -->
    <div class="overlay"></div>

    <!-- Fog -->
    <div class="fog"></div>

    <!-- Golden Particles -->
    <div id="particles-js"></div>

    <!-- Main Content -->
    <main class="container">

        <!-- Brand -->
        <section class="hero">

            <h1>FAYROSE</h1>

            <p class="tagline">
                Wear The Mystery.<br>
                Live The Story.
            </p>

        </section>

        <!-- Divider -->
        <div class="divider">
            <span>✦</span>
        </div>

        <!-- Secret Access -->
        <section class="access">

            <h2>SECRET ACCESS</h2>

            <input
                type="password"
                id="secretKey"
                placeholder="Secret Key"
                autocomplete="off">

            <button id="enterBtn">
                ENTER
            </button>

        </section>

        <!-- Counter -->
        <section class="counter">

            <h3>Exclusive Drop II</h3>

            <p>Remaining Places</p>

            <div class="places">
                30 / 30
            </div>

        </section>

        <!-- Scroll -->
        <div class="scroll">

            <span>↓</span>

        </div>

    </main>

    <!-- Libraries -->
    <script src="https://cdn.jsdelivr.net/npm/tsparticles@3/tsparticles.bundle.min.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3/dist/gsap.min.js"></script>

    <!-- JS -->
    <script src="script.js"></script>

</body>

</html>
